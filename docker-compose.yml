services:
  web-shooter:
    build: .
    image: web-shooter:latest
    container_name: web-shooter
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8088:8088"
    volumes:
      # The host's context library — finished scrapes land here directly.
      - /home/kratos/context:/context
      # Persistent job artifacts (downloads survive restarts).
      - web-shooter-jobs:/data/jobs
    environment:
      - DOCSCRAPE_CONTEXT=/context
      - DOCSCRAPE_DATA=/data/jobs

volumes:
  web-shooter-jobs:
