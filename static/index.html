<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WEB-SHOOTER · doc scraper</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- background web pattern -->
<div class="web-bg" aria-hidden="true"></div>
<div class="halftone" aria-hidden="true"></div>

<header class="masthead">
  <div class="title-stack">
    <div class="kicker">★ amazing ★</div>
    <h1 class="logo">WEB-SHOOTER</h1>
    <div class="tagline">documentation crawler &middot; spins any docs site into AI context</div>
  </div>
  <div class="spider" aria-hidden="true">
    <svg viewBox="0 0 100 100" width="120" height="120">
      <g stroke="#1a1a1a" stroke-width="3" fill="#c8102e" stroke-linecap="round">
        <ellipse cx="50" cy="55" rx="18" ry="22"/>
        <circle cx="50" cy="32" r="11"/>
        <path d="M34 45 L10 30 M34 55 L8 55 M34 65 L10 80
                 M66 45 L90 30 M66 55 L92 55 M66 65 L90 80" fill="none"/>
        <ellipse cx="46" cy="30" rx="3" ry="2.5" fill="#fff"/>
        <ellipse cx="54" cy="30" rx="3" ry="2.5" fill="#fff"/>
      </g>
    </svg>
  </div>
</header>

<main class="panel">

  <section class="panel-card">
    <div class="caption-box">PASTE A DOCS URL · CHOOSE YOUR WEB-SHOT</div>

    <form id="scrape-form" autocomplete="off">
      <label class="big-label">DOCUMENTATION ROOT URL</label>
      <input id="url" name="url" type="url" required
             placeholder="https://docs.example.com/">

      <div class="opts-row">
        <label>
          <span class="lbl">MAX PAGES</span>
          <input id="max" type="number" min="1" max="2000" value="200">
        </label>
        <label>
          <span class="lbl">DELAY (sec)</span>
          <input id="delay" type="number" min="0" max="5" step="0.05" value="0.2">
        </label>
      </div>

      <div class="big-label">PICK A WEB-SHOT</div>
      <div class="choice-grid">

        <label class="choice">
          <input type="radio" name="choice" value="single" checked>
          <div class="choice-card">
            <div class="num">①</div>
            <div class="ctitle">SINGLE FILE</div>
            <div class="csub">→ DOWNLOAD .MD</div>
            <p>One <code>.md</code> with TOC. Best for a single AI context window.</p>
          </div>
        </label>

        <label class="choice">
          <input type="radio" name="choice" value="split">
          <div class="choice-card">
            <div class="num">②</div>
            <div class="ctitle">SPLIT FOLDER</div>
            <div class="csub">→ DOWNLOAD .ZIP</div>
            <p>One file per page + <code>index.md</code>. Best for RAG / per-topic lookup.</p>
          </div>
        </label>

      </div>

      <button type="submit" id="go" class="shoot-btn">
        <span>SHOOT WEB!</span>
      </button>
    </form>
  </section>

  <section id="status-card" class="panel-card hidden">
    <div class="caption-box yellow">CRAWL IN PROGRESS</div>
    <div class="status-line"><span class="lbl">JOB:</span> <code id="s-job"></code></div>
    <div class="status-line"><span class="lbl">URL:</span> <code id="s-url"></code></div>
    <div class="status-line"><span class="lbl">MODE:</span> <code id="s-mode"></code></div>
    <div class="status-line"><span class="lbl">PAGES:</span> <code id="s-pages">0</code></div>
    <div class="status-line"><span class="lbl">NOW FETCHING:</span> <code id="s-cur">…</code></div>
    <div class="progress"><div id="bar"></div></div>
    <div id="result" class="result"></div>
  </section>

</main>

<footer class="footer">
  <span>WEB-SHOOTER · port 8088</span>
  <span><a href="/docs">openapi /docs</a> · <a href="/healthz">/healthz</a> · <a href="https://github.com/KeeperOfStack/web-shooter">github</a></span>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
