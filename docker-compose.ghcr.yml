# Pull the prebuilt image from GHCR — no repo clone needed.
#
# Usage:
#   1. Pick a host folder for your AI context library, e.g. ~/context
#   2. docker compose -f docker-compose.ghcr.yml up -d
#   3. open http://localhost:8088/
#
# Override the context dir by exporting CONTEXT_DIR before `up`:
#   CONTEXT_DIR=/srv/ai-context docker compose -f docker-compose.ghcr.yml up -d

services:
  web-shooter:
    image: ghcr.io/keeperofstack/web-shooter:latest
    container_name: web-shooter
    restart: unless-stopped
    pull_policy: always
    ports:
      - "8088:8088"
    volumes:
      # Host context library — finished "deliver to ~/context" jobs land here.
      - /media/chasm/projects/web-shooter/web-shooter-output:/context
      # Persistent job artifacts (downloads survive restarts).
      - web-shooter-jobs:/data/jobs
    environment:
      - DOCSCRAPE_CONTEXT=/context
      - DOCSCRAPE_DATA=/data/jobs

volumes:
  web-shooter-jobs:
